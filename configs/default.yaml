# Model configuration
model:
  name: "gpt2"
  device: "auto"  # auto, cuda, mps, cpu
  trust_remote_code: false

# Generation parameters
generation:
  max_length: 100
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  num_return_sequences: 1
  do_sample: true
  repetition_penalty: 1.0
  no_repeat_ngram_size: 2

# Data configuration
data:
  dataset_name: null  # HuggingFace dataset name
  data_path: null     # Path to local data file
  max_length: 512
  batch_size: 32
  num_workers: 4
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  seed: 42

# Training configuration
training:
  learning_rate: 5e-5
  num_epochs: 3
  warmup_steps: 100
  weight_decay: 0.01
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  precision: 16  # 16 or 32

# Evaluation configuration
evaluation:
  metrics:
    - "bleu"
    - "rouge"
    - "bert_score"
    - "distinct_n"
    - "self_bleu"
    - "perplexity"
    - "length_stats"
    - "repetition_ratio"
  condition_evaluation: true

# Logging configuration
logging:
  log_dir: "logs"
  experiment_name: "conditional_text_generation"
  log_every_n_steps: 100
  val_check_interval: 0.5
  save_top_k: 3
  monitor: "val_loss"
  mode: "min"

# Paths
paths:
  data_dir: "data"
  model_dir: "models"
  output_dir: "outputs"
  assets_dir: "assets"
