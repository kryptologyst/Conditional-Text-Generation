# Model configuration for GPT-2 Medium
model:
  name: "gpt2-medium"
  device: "auto"
  trust_remote_code: false

# Generation parameters
generation:
  max_length: 150
  temperature: 0.8
  top_p: 0.95
  top_k: 50
  num_return_sequences: 3
  do_sample: true
  repetition_penalty: 1.1
  no_repeat_ngram_size: 3

# Data configuration
data:
  dataset_name: null
  data_path: null
  max_length: 512
  batch_size: 16  # Smaller batch size for medium model
  num_workers: 4
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  seed: 42

# Training configuration
training:
  learning_rate: 3e-5
  num_epochs: 5
  warmup_steps: 200
  weight_decay: 0.01
  gradient_clip_val: 1.0
  accumulate_grad_batches: 2
  precision: 16

# Evaluation configuration
evaluation:
  metrics:
    - "bleu"
    - "rouge"
    - "bert_score"
    - "distinct_n"
    - "self_bleu"
    - "perplexity"
    - "length_stats"
    - "repetition_ratio"
  condition_evaluation: true

# Logging configuration
logging:
  log_dir: "logs"
  experiment_name: "conditional_text_generation_gpt2_medium"
  log_every_n_steps: 50
  val_check_interval: 0.5
  save_top_k: 3
  monitor: "val_loss"
  mode: "min"

# Paths
paths:
  data_dir: "data"
  model_dir: "models"
  output_dir: "outputs"
  assets_dir: "assets"
